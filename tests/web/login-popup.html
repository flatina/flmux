<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(circle at top, #1f2a38, #0f141b 60%);
      color: #e8edf2; display: grid; place-items: center; padding: 2rem;
    }
    .card {
      width: min(400px, 100%); padding: 24px; border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(11, 16, 22, 0.92);
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    }
    h1 { margin: 0 0 8px; font-size: 20px; }
    p { margin: 0 0 16px; color: #9db0c3; font-size: 14px; }
    label { display: flex; flex-direction: column; gap: 6px; font-size: 14px; color: #cfd8e3; margin-bottom: 12px; }
    input {
      width: 100%; padding: 10px 12px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #131a23; color: #f4f7fa; font: inherit;
    }
    button {
      width: 100%; padding: 10px 20px; border: none; border-radius: 10px;
      background: #ffb45e; color: #0f141b; font: inherit;
      font-weight: 700; cursor: pointer; margin-top: 4px;
    }
    .error { color: #ff8a8a; font-size: 13px; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Sign In</h1>
    <p>Enter your credentials to continue.</p>
    <label>Email
      <input id="email-input" name="email" type="email" placeholder="you@example.com" autocomplete="email" />
    </label>
    <label>Password
      <input id="password-input" name="password" type="password" placeholder="Enter password" autocomplete="current-password" />
    </label>
    <button id="sign-in-btn" type="button">Sign In</button>
    <div class="error" id="error-msg"></div>
  </main>
  <script>
    document.getElementById("sign-in-btn").addEventListener("click", () => {
      const email = document.getElementById("email-input").value.trim();
      const password = document.getElementById("password-input").value;
      const error = document.getElementById("error-msg");
      if (!email) { error.style.display = "block"; error.textContent = "Email is required."; return; }
      if (!password) { error.style.display = "block"; error.textContent = "Password is required."; return; }
      error.style.display = "none";
      localStorage.setItem("login-user", email);
      window.close();
    });
  </script>
</body>
</html>
