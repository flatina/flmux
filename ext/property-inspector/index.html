<style>
  .property-inspector {
    height: 100%;
    overflow: auto;
    padding: 18px;
    color: var(--text);
    background:
      radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 18%, transparent), transparent 36%),
      linear-gradient(180deg, color-mix(in srgb, var(--panel-2) 78%, transparent), var(--surface));
    font-family: "Segoe UI", "Helvetica Neue", sans-serif;
  }

  .property-inspector-shell {
    display: grid;
    gap: 14px;
  }

  .property-inspector-hero,
  .property-inspector-card {
    border: 1px solid var(--border);
    background: color-mix(in srgb, var(--panel) 88%, transparent);
    box-shadow: 0 16px 40px color-mix(in srgb, var(--shadow) 55%, transparent);
    backdrop-filter: blur(8px);
  }

  .property-inspector-hero {
    display: grid;
    gap: 12px;
    padding: 16px;
    border-radius: 18px;
  }

  .property-inspector-kicker {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .property-inspector-title {
    font-size: 28px;
    font-weight: 700;
  }

  .property-inspector-subtitle {
    color: var(--muted);
    max-width: 70ch;
  }

  .property-inspector-controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    align-items: end;
  }

  .property-inspector-field {
    display: grid;
    gap: 6px;
  }

  .property-inspector-field label,
  .property-inspector-status,
  .property-inspector-stale,
  .property-inspector-error,
  .property-inspector-card-meta {
    font-size: 12px;
    color: var(--muted);
  }

  .property-inspector select,
  .property-inspector input,
  .property-inspector textarea,
  .property-inspector button {
    font: inherit;
    color: inherit;
    border: 1px solid var(--border);
    background: var(--input-bg);
    border-radius: 10px;
  }

  .property-inspector select,
  .property-inspector input,
  .property-inspector textarea {
    padding: 8px 10px;
  }

  .property-inspector textarea {
    min-height: 78px;
    resize: vertical;
  }

  .property-inspector button {
    padding: 8px 10px;
    background: color-mix(in srgb, var(--accent) 18%, var(--panel));
    cursor: pointer;
  }

  .property-inspector button:hover {
    background: color-mix(in srgb, var(--accent) 24%, var(--panel));
  }

  .property-inspector-status {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .property-inspector-stale {
    min-height: 18px;
    color: var(--accent);
  }

  .property-inspector-error {
    min-height: 18px;
    color: #ff7b7b;
  }

  .property-inspector-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 14px;
  }

  .property-inspector-card {
    border-radius: 16px;
    overflow: hidden;
  }

  .property-inspector-card-head {
    display: grid;
    gap: 4px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--divider);
    background: linear-gradient(180deg, color-mix(in srgb, var(--panel-2) 88%, transparent), transparent);
  }

  .property-inspector-card-title {
    font-size: 15px;
    font-weight: 700;
  }

  .property-inspector-list {
    display: grid;
  }

  .property-inspector-row {
    display: grid;
    gap: 10px;
    padding: 12px 16px;
    border-top: 1px solid color-mix(in srgb, var(--divider) 70%, transparent);
  }

  .property-inspector-row:first-child {
    border-top: none;
  }

  .property-inspector-key {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    font-family: Consolas, "Cascadia Code", monospace;
    font-size: 12px;
  }

  .property-inspector-badge {
    padding: 2px 7px;
    border-radius: 999px;
    background: color-mix(in srgb, var(--subtle) 75%, transparent);
    color: var(--muted);
    font-family: "Segoe UI", sans-serif;
    font-size: 11px;
  }

  .property-inspector-value {
    display: grid;
    gap: 8px;
  }

  .property-inspector-readonly {
    margin: 0;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--divider);
    background: color-mix(in srgb, var(--surface) 82%, transparent);
    white-space: pre-wrap;
    word-break: break-word;
    font-family: Consolas, "Cascadia Code", monospace;
    font-size: 12px;
  }

  .property-inspector-empty {
    padding: 18px 16px;
    color: var(--muted);
  }
</style>

<section class="property-inspector">
  <div class="property-inspector-shell">
    <section class="property-inspector-hero">
      <div class="property-inspector-kicker">Property System</div>
      <div class="property-inspector-title">Generic inspector</div>
      <div class="property-inspector-subtitle">
        Snapshot-based inspector. Use Refresh to resync targets and values after external changes.
      </div>
      <div class="property-inspector-controls">
        <div class="property-inspector-field">
          <label>Workspace target</label>
          <select data-ref="workspace-select"></select>
        </div>
        <div class="property-inspector-field">
          <label>Pane target</label>
          <select data-ref="pane-select"></select>
        </div>
        <div class="property-inspector-field">
          <label>Actions</label>
          <button type="button" data-ref="refresh-btn">Refresh</button>
        </div>
      </div>
      <div class="property-inspector-status" data-ref="status"></div>
      <div class="property-inspector-stale" data-ref="stale"></div>
      <div class="property-inspector-error" data-ref="error"></div>
    </section>
    <section class="property-inspector-grid">
      <article class="property-inspector-card" data-ref="app-card"></article>
      <article class="property-inspector-card" data-ref="workspace-card"></article>
      <article class="property-inspector-card" data-ref="pane-card"></article>
    </section>
  </div>
</section>
